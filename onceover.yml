# .onceover.yml
# Defines which OS combinations to test catalog compilation against.
# Every entry here is tested automatically - if any break, the test fails.
# This protects previously-working OS from regressions when adding new ones.

---
classes:
  - clustercontrol

nodes:
  - rocky9
  - almalinux9
  - rhel9
  - ubuntu2204
  - ubuntu2404
  - debian12

node_groups:
  all_nodes:
    - rocky9
    - almalinux9
    - rhel9
    - ubuntu2204
    - ubuntu2404
    - debian12

class_groups:
  all_classes:
    - clustercontrol

test_matrix:
  - all_classes:
      nodes: all_nodes

facts:
  rocky9:
    fqdn: "clustercontrol.local"
    os:
      family: "RedHat"
      name: "Rocky"
      release:
        major: "9"
        full: "9.4"
    networking:
      ip: "10.10.16.13"
    memory:
      system:
        total_bytes: 4294967296

  almalinux9:
    fqdn: "clustercontrol.local"
    os:
      family: "RedHat"
      name: "AlmaLinux"
      release:
        major: "9"
        full: "9.4"
    networking:
      ip: "10.10.16.13"
    memory:
      system:
        total_bytes: 4294967296

  rhel9:
    fqdn: "clustercontrol.local"
    os:
      family: "RedHat"
